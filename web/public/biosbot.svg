<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 32 32" fill="none">
  <!-- Terminal/Command Line Icon for BiosBot -->
  <defs>
    <linearGradient id="terminal-gradient" x1="0%" y1="0%" x2="100%" y2="100%">
      <stop offset="0%" style="stop-color:#1a1a2e;stop-opacity:1" />
      <stop offset="100%" style="stop-color:#16213e;stop-opacity:1" />
    </linearGradient>
  </defs>

  <!-- Background rounded rectangle -->
  <rect x="1" y="1" width="30" height="30" rx="6" fill="url(#terminal-gradient)" stroke="#00bcd4" stroke-width="1"/>

  <!-- Terminal window header dots -->
  <circle cx="6" cy="5" r="1.2" fill="#ff5f56"/>
  <circle cx="10" cy="5" r="1.2" fill="#ffbd2e"/>
  <circle cx="14" cy="5" r="1.2" fill="#27ca40"/>

  <!-- Command prompt symbol > -->
  <path d="M6 12 L11 16 L6 20" stroke="#00bcd4" stroke-width="2" fill="none" stroke-linecap="round" stroke-linejoin="round"/>

  <!-- Cursor line -->
  <rect x="13" y="14" width="8" height="3" rx="0.5" fill="#00bcd4"/>

  <!-- Second line hint -->
  <rect x="6" y="24" width="12" height="2" rx="1" fill="rgba(0,188,212,0.4)"/>
</svg>
