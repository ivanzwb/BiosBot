<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 32 32" fill="none">
  <!-- DNA Double Helix Icon for BiosBot -->
  <defs>
    <linearGradient id="dna-gradient" x1="0%" y1="0%" x2="100%" y2="100%">
      <stop offset="0%" style="stop-color:#00bcd4;stop-opacity:1" />
      <stop offset="100%" style="stop-color:#4caf50;stop-opacity:1" />
    </linearGradient>
  </defs>

  <!-- Background circle -->
  <circle cx="16" cy="16" r="15" fill="url(#dna-gradient)" />

  <!-- DNA helix strands -->
  <path d="M10 6 Q16 10, 22 8 Q16 12, 10 10 Q16 16, 22 14 Q16 20, 10 18 Q16 24, 22 22 Q16 28, 10 26"
        stroke="white" stroke-width="2" fill="none" stroke-linecap="round"/>
  <path d="M22 6 Q16 10, 10 8 Q16 12, 22 10 Q16 16, 10 14 Q16 20, 22 18 Q16 24, 10 22 Q16 28, 22 26"
        stroke="white" stroke-width="2" fill="none" stroke-linecap="round"/>

  <!-- Connection bars -->
  <line x1="11" y1="9" x2="21" y2="9" stroke="rgba(255,255,255,0.6)" stroke-width="1.5"/>
  <line x1="12" y1="15" x2="20" y2="15" stroke="rgba(255,255,255,0.6)" stroke-width="1.5"/>
  <line x1="11" y1="21" x2="21" y2="21" stroke="rgba(255,255,255,0.6)" stroke-width="1.5"/>
</svg>
